<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il mio ricettario</title>

  <!-- PWA Meta Tags & Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ricettario">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3565/3565418.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center p-0 md:p-4">

  <!-- Mobile Frame Container -->
  <div class="w-full max-w-md bg-white min-h-screen md:min-h-[844px] md:max-h-[844px] md:rounded-[32px] shadow-2xl overflow-hidden flex flex-col relative">

    <!-- Header -->
    <div class="px-6 pt-8 pb-4">
      <h1 class="text-3xl font-bold text-gray-900">Il mio ricettario</h1>
      <p id="recipe-count" class="text-gray-400 text-sm mt-1">0 ricette salvate</p>
    </div>

    <!-- Search Bar -->
    <div class="px-6 mb-4">
      <div class="relative flex items-center">
        <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400"></i>
        <input type="text" id="search-input" onkeyup="filterRecipes()" placeholder="Cerca per ingrediente, es. lenticchie" 
               class="w-full bg-gray-100 rounded-2xl py-3 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-black">
      </div>
    </div>

    <!-- Categories Pills -->
    <div class="px-6 mb-6 flex gap-2 overflow-x-auto no-scrollbar">
      <button onclick="setCategory('Tutti')" class="cat-btn bg-black text-white px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Tutti</button>
      <button onclick="setCategory('Dolci')" class="cat-btn bg-gray-100 text-gray-600 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Dolci</button>
      <button onclick="setCategory('Primi')" class="cat-btn bg-gray-100 text-gray-600 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Primi</button>
      <button onclick="setCategory('Secondi')" class="cat-btn bg-gray-100 text-gray-600 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Secondi</button>
    </div>

    <!-- Recipes Grid -->
    <div id="recipes-grid" class="px-6 flex-1 overflow-y-auto grid grid-cols-2 gap-4 pb-24">
      <!-- Le ricette verranno caricate qui dinamicamente -->
    </div>

    <!-- Floating Action Button (+) -->
    <button onclick="toggleModal(true)" class="absolute bottom-6 right-6 bg-emerald-400 hover:bg-emerald-500 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl transition">
      <i class="fa-solid fa-plus"></i>
    </button>

    <!-- Scheda Ricetta Singola -->
    <div id="recipe-detail" class="absolute inset-0 bg-white hidden flex-col overflow-y-auto z-40">
      <div class="relative h-64 flex-shrink-0">
        <img id="rd-image" src="" class="w-full h-full object-cover">
        <button onclick="closeRecipeDetail()" class="absolute top-6 left-4 w-9 h-9 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow">
          <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>
      </div>

      <div class="bg-white rounded-t-[28px] -mt-6 relative flex-1 px-6 pt-6 pb-10">
        <span id="rd-category" class="inline-block bg-emerald-100 text-emerald-700 text-[11px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-3"></span>
        <h2 id="rd-title" class="text-2xl font-bold text-gray-900 mb-5 leading-tight"></h2>

        <!-- Selettore Porzioni -->
        <div class="flex items-center justify-between bg-gray-50 rounded-2xl px-4 py-3 mb-6">
          <span class="text-sm text-gray-500 leading-tight">Per quante<br>persone?</span>
          <div class="flex items-center gap-4">
            <button onclick="adjustServings(-1)" class="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-minus text-xs"></i></button>
            <span class="font-bold text-sm w-16 text-center leading-tight"><span id="rd-servings">4</span><br><span class="font-normal text-gray-400 text-xs">persone</span></span>
            <button onclick="adjustServings(1)" class="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-plus text-xs"></i></button>
          </div>
        </div>

        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Ingredienti</h3>
        <div id="rd-ingredients" class="divide-y divide-gray-100 mb-6"></div>

        <h3 id="rd-instructions-label" class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Preparazione</h3>
        <ol id="rd-instructions" class="space-y-3 text-sm text-gray-700 mb-6 list-decimal list-inside"></ol>

        <p id="rd-description" class="text-sm text-gray-500 leading-relaxed"></p>
      </div>
    </div>

  </div>

  <!-- Modal Inserimento Ricetta -->
  <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end md:items-center justify-center hidden z-50">
    <div class="bg-white w-full max-w-md rounded-t-3xl md:rounded-3xl p-6 shadow-xl max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold">Aggiungi nuova ricetta</h3>
        <button onclick="toggleModal(false)" class="text-gray-400 hover:text-black"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <p class="text-sm text-gray-500 mb-4">Incolla il testo grezzo della ricetta. Gemini la analizzerà e la strutturerà automaticamente!</p>
      
      <textarea id="raw-recipe-text" rows="6" placeholder="Es: Torta Margherita. Servono 200g di farina, 3 uova, 150g di zucchero. Cuocere a 180 gradi per 40 min..." 
                class="w-full border rounded-2xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 mb-4"></textarea>

      <button id="btn-submit" onclick="submitRecipe()" class="w-full bg-emerald-400 hover:bg-emerald-500 text-white font-semibold py-3 rounded-2xl transition flex justify-center items-center gap-2">
        <span>Elabora con AI</span>
      </button>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://ricettario-backend.bix20252025.workers.dev";

    let allRecipes = [];
    let currentCategory = "Tutti";

    // Registrazione Service Worker per PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrato con successo:', reg.scope))
          .catch(err => console.error('Errore registrazione Service Worker:', err));
      });
    }

    // Carica ricette all'avvio
    async function loadRecipes() {
      try {
        const res = await fetch(`${WORKER_URL}/api/recipes`);
        allRecipes = await res.json();
        renderRecipes();
      } catch (err) {
        console.error("Errore nel caricamento delle ricette:", err);
      }
    }

    function renderRecipes() {
      const grid = document.getElementById("recipes-grid");
      const searchVal = document.getElementById("search-input").value.toLowerCase();
      grid.innerHTML = "";

      const filtered = allRecipes.filter(r => {
        const matchCat = currentCategory === "Tutti" || r.category === currentCategory;
        const matchSearch = r.title.toLowerCase().includes(searchVal) || 
                            r.ingredients.some(i => i.name.toLowerCase().includes(searchVal));
        return matchCat && matchSearch;
      });

      document.getElementById("recipe-count").innerText = `${allRecipes.length} ricette salvate`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10">Nessuna ricetta trovata</div>`;
        return;
      }

      filtered.forEach(r => {
        const img = imageForCategory(r.category);

        grid.innerHTML += `
          <div onclick="openRecipeDetail('${r.id}')" class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col cursor-pointer active:scale-[0.97] transition">
            <div class="relative h-32 bg-gray-200">
              <img src="${img}" class="w-full h-full object-cover">
              <span class="absolute top-2 left-2 bg-white/90 backdrop-blur-sm text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider text-gray-700">${r.category}</span>
            </div>
            <div class="p-3 flex flex-col justify-between flex-1">
              <h4 class="font-bold text-sm text-gray-900 leading-tight mb-2">${r.title}</h4>
              <p class="text-xs text-gray-400"><i class="fa-regular fa-clock mr-1"></i>${r.prep_time_min} min</p>
            </div>
          </div>
        `;
      });
    }

    // Immagine di sfondo in base alla categoria (in attesa di foto reali per ricetta)
    function imageForCategory(category) {
      const images = {
        "Primi": "https://images.unsplash.com/photo-1476124369491-e7addf5db371?auto=format&fit=crop&w=800&q=80",
        "Secondi": "https://images.unsplash.com/photo-1432139555190-58524dae6a55?auto=format&fit=crop&w=800&q=80",
        "Dolci": "https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=800&q=80",
        "Contorni": "https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=800&q=80",
        "Antipasti": "https://images.unsplash.com/photo-1541529086526-db283c563270?auto=format&fit=crop&w=800&q=80"
      };
      return images[category] || "https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&w=800&q=80";
    }

    function setCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        if(btn.innerText === cat) {
          btn.className = "cat-btn bg-black text-white px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap";
        } else {
          btn.className = "cat-btn bg-gray-100 text-gray-600 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap";
        }
      });
      renderRecipes();
    }

    function filterRecipes() {
      renderRecipes();
    }

    // ==========================================
    // Scheda ricetta singola
    // ==========================================
    let currentDetailRecipe = null;
    let currentServings = 1;

    function openRecipeDetail(id) {
      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;

      currentDetailRecipe = recipe;
      currentServings = recipe.servings || 4;

      document.getElementById("rd-image").src = imageForCategory(recipe.category);
      document.getElementById("rd-category").innerText = recipe.category;
      document.getElementById("rd-title").innerText = recipe.title;

      const instructionsLabel = document.getElementById("rd-instructions-label");
      const instructionsList = document.getElementById("rd-instructions");
      if (Array.isArray(recipe.instructions) && recipe.instructions.length > 0) {
        instructionsLabel.classList.remove("hidden");
        instructionsList.innerHTML = recipe.instructions.map(step => `<li>${step}</li>`).join("");
      } else {
        instructionsLabel.classList.add("hidden");
        instructionsList.innerHTML = "";
      }

      document.getElementById("rd-description").innerText =
        recipe.description || `Pronta in circa ${recipe.prep_time_min} minuti.`;

      renderServings();

      const detail = document.getElementById("recipe-detail");
      detail.classList.remove("hidden");
      detail.classList.add("flex");
      detail.scrollTop = 0;
    }

    function closeRecipeDetail() {
      const detail = document.getElementById("recipe-detail");
      detail.classList.add("hidden");
      detail.classList.remove("flex");
      currentDetailRecipe = null;
    }

    function adjustServings(delta) {
      if (!currentDetailRecipe) return;
      const next = currentServings + delta;
      if (next < 1) return;
      currentServings = next;
      renderServings();
    }

    function renderServings() {
      if (!currentDetailRecipe) return;
      document.getElementById("rd-servings").innerText = currentServings;

      const baseServings = currentDetailRecipe.servings || 4;
      const ratio = currentServings / baseServings;

      const list = document.getElementById("rd-ingredients");
      list.innerHTML = (currentDetailRecipe.ingredients || []).map(ing => {
        const scaledQty = formatQuantity(ing.quantity * ratio, ing.unit);
        const unit = ing.unit ? ` ${ing.unit}` : "";
        return `
          <div class="flex justify-between items-center py-3 text-sm">
            <span class="text-gray-700">${ing.name}</span>
            <span class="font-bold text-gray-900">${scaledQty}${unit}</span>
          </div>
        `;
      }).join("");
    }

    // Arrotonda le quantità scalate in modo leggibile (interi per i "pz")
    function formatQuantity(value, unit) {
      if (unit === "pz" || unit === "pezzi") {
        return Math.max(1, Math.round(value));
      }
      const rounded = Math.round(value * 10) / 10;
      return rounded % 1 === 0 ? rounded.toFixed(0) : rounded.toFixed(1);
    }

    function toggleModal(show) {
      document.getElementById("modal").classList.toggle("hidden", !show);
    }

    async function submitRecipe() {
      const text = document.getElementById("raw-recipe-text").value.trim();
      if (!text) return alert("Inserisci il testo della ricetta");

      const btn = document.getElementById("btn-submit");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Elaborazione Gemini...`;

      try {
        const res = await fetch(`${WORKER_URL}/api/parse-recipe`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rawText: text })
        });

        if (res.ok) {
          document.getElementById("raw-recipe-text").value = "";
          toggleModal(false);
          await loadRecipes();
        } else {
          alert("Errore nell'elaborazione della ricetta");
        }
      } catch (e) {
        alert("Errore di connessione al worker");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>Elabora con AI</span>`;
      }
    }

    loadRecipes();
  </script>
</body>
</html>
