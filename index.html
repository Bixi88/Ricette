<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il mio ricettario</title>

  <!-- PWA Meta Tags & Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" id="theme-color-meta" content="#f3f4f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ricettario">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3565/3565418.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <script>
    // Applica subito il tema salvato (o quello di sistema) per evitare un flash del tema sbagliato
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Impedisce lo scroll "elastico" del browser che innesca il refresh della pagina/PWA */
    html, body {
      overscroll-behavior-y: none;
    }

    /* Sfondo esplicito sull'elemento html: senza questo, durante l'overscroll o dietro
       alle barre di sistema del telefono resterebbe visibile il bianco di default del browser */
    html {
      background-color: #f3f4f6; /* gray-100, uguale al body in tema chiaro */
    }
    html.dark {
      background-color: #030712; /* gray-950, uguale al body in tema scuro */
    }

    /* Impedisce la selezione del testo per mantenere l'esperienza da app nativa */
    body {
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Eccezione: i campi di input/modifica devono restare selezionabili */
    input, textarea, [contenteditable="true"] {
      -webkit-user-select: text;
      user-select: text;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 min-h-screen flex justify-center items-center p-0 md:p-4 transition-colors">

  <!-- Mobile Frame Container -->
  <div class="w-full max-w-md bg-white dark:bg-gray-900 min-h-screen md:min-h-[844px] md:max-h-[844px] md:rounded-[32px] shadow-2xl overflow-hidden flex flex-col relative transition-colors">

    <!-- Header -->
    <div class="px-6 pt-8 pb-4 flex items-start justify-between gap-3">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Il mio ricettario</h1>
      </div>
      <button onclick="toggleTheme()" id="theme-toggle-btn" aria-label="Cambia tema chiaro/scuro"
              class="w-7 h-4 flex-shrink-0 rounded-full bg-gray-300 dark:bg-emerald-500/80 relative transition-colors duration-300 mt-2">
        <span id="theme-toggle-knob"
              class="absolute top-0.5 left-0.5 w-3 h-3 rounded-full bg-white shadow-md transition-transform duration-300 ease-in-out dark:translate-x-3"></span>
      </button>
    </div>

    <!-- Search Bar -->
    <div class="px-6 mb-4">
      <div class="relative flex items-center">
        <i class="fa-solid fa-magnifying-glass absolute left-4 text-gray-400"></i>
        <input type="text" id="search-input" onkeyup="filterRecipes()" placeholder="" 
               class="w-full bg-gray-100 dark:bg-gray-800 dark:text-white dark:placeholder-gray-500 rounded-2xl py-3 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-emerald-400">
      </div>
    </div>

    <!-- Categories Pills -->
    <div class="px-6 mb-6 flex gap-2 overflow-x-auto no-scrollbar">
      <button onclick="setCategory('Tutti')" class="cat-btn bg-black dark:bg-white text-white dark:text-black px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Tutti</button>
      <button onclick="setCategory('Dolci')" class="cat-btn bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Dolci</button>
      <button onclick="setCategory('Primi')" class="cat-btn bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Primi</button>
      <button onclick="setCategory('Secondi')" class="cat-btn bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap">Secondi</button>
    </div>

    <!-- Banner modalità offline (mostrato quando si usano le ricette dalla cache locale) -->
    <div id="offline-banner" class="hidden mx-6 mb-4 px-4 py-2 bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300 text-xs font-semibold rounded-xl flex items-center gap-2">
      <i class="fa-solid fa-wifi"></i> Sei offline: ricette caricate dalla cache locale
    </div>

    <!-- Recipes Grid -->
    <div id="recipes-grid" class="px-6 flex-1 overflow-y-auto overscroll-contain grid grid-cols-2 auto-rows-min content-start gap-4 pb-24">
      <!-- Le ricette verranno caricate qui dinamicamente -->
    </div>

    <!-- Floating Action Button (+) -->
    <button onclick="toggleModal(true)" class="absolute bottom-6 right-6 bg-emerald-400 hover:bg-emerald-500 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl transition">
      <i class="fa-solid fa-plus"></i>
    </button>

    <!-- Scheda Ricetta Singola -->
    <div id="recipe-detail" class="absolute inset-0 bg-white dark:bg-gray-900 flex flex-col overflow-y-auto overscroll-contain z-40 translate-y-full transition-transform duration-300 ease-out"
         ontouchstart="onDetailTouchStart(event)" ontouchmove="onDetailTouchMove(event)" ontouchend="onDetailTouchEnd(event)">
      <div class="relative h-64 flex-shrink-0">
        <img id="rd-image" src="" class="w-full h-full object-cover">
        <button onclick="closeRecipeDetail()" class="absolute top-6 left-4 w-9 h-9 bg-white/90 dark:bg-gray-800/90 rounded-full flex items-center justify-center shadow">
          <i class="fa-solid fa-chevron-left text-sm dark:text-white"></i>
        </button>
        <button onclick="triggerPhotoChange()" class="absolute top-6 right-4 w-9 h-9 bg-white/90 dark:bg-gray-800/90 rounded-full flex items-center justify-center shadow">
          <i class="fa-solid fa-camera text-sm dark:text-white"></i>
        </button>
        <button id="rd-edit-btn" onclick="enterEditMode()" class="absolute top-6 right-16 w-9 h-9 bg-white/90 dark:bg-gray-800/90 rounded-full flex items-center justify-center shadow">
          <i class="fa-solid fa-pen text-sm dark:text-white"></i>
        </button>
        <input type="file" id="rd-photo-input" accept="image/*" class="hidden" onchange="onPhotoSelected(event)">
      </div>

      <div class="bg-white dark:bg-gray-900 rounded-t-[28px] -mt-6 relative flex-1 px-6 pt-6 pb-10">

        <div id="rd-edit-actions" class="hidden gap-3 mb-4">
          <button onclick="cancelEditMode()" class="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-semibold py-3 rounded-2xl">Annulla</button>
          <button id="rd-save-btn" onclick="saveRecipeEdits()" class="flex-1 bg-emerald-400 hover:bg-emerald-500 text-white font-semibold py-3 rounded-2xl flex items-center justify-center gap-2">
            <i class="fa-solid fa-check"></i> Salva
          </button>
        </div>

        <span id="rd-category" class="inline-block bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 text-[11px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-3"></span>
        <select id="rd-category-select" class="hidden border dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl px-3 py-2 text-sm mb-3">
          <option value="Antipasti">Antipasti</option>
          <option value="Primi">Primi</option>
          <option value="Secondi">Secondi</option>
          <option value="Contorni">Contorni</option>
          <option value="Dolci">Dolci</option>
        </select>

        <h2 id="rd-title" class="text-2xl font-bold text-gray-900 dark:text-white mb-5 leading-tight"></h2>
        <input id="rd-title-input" type="text" class="hidden w-full border dark:border-gray-700 dark:bg-gray-800 rounded-xl px-3 py-2 text-xl font-bold text-gray-900 dark:text-white mb-5">

        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Ingredienti</h3>
        <div id="rd-ingredients" class="divide-y divide-gray-100 dark:divide-gray-800 mb-6"></div>

        <h3 id="rd-instructions-label" class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Preparazione</h3>
        <ol id="rd-instructions" class="space-y-3 text-base font-medium text-gray-800 dark:text-gray-200 mb-6 list-decimal list-inside leading-relaxed"></ol>

        <p id="rd-description" class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed"></p>
        <textarea id="rd-description-input" rows="3" class="hidden w-full border dark:border-gray-700 dark:bg-gray-800 rounded-xl px-3 py-2 text-sm text-gray-600 dark:text-gray-300 leading-relaxed"></textarea>
      </div>
    </div>

  </div>

  <!-- Popup conferma eliminazione -->
  <div id="delete-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center hidden z-[60]">
    <div class="bg-white dark:bg-gray-800 w-[85%] max-w-xs rounded-3xl p-6 shadow-xl text-center">
      <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Eliminare la ricetta?</h3>
      <p id="delete-modal-text" class="text-sm text-gray-500 dark:text-gray-400 mb-6">Questa azione non può essere annullata.</p>
      <div class="flex gap-3">
        <button onclick="cancelDeleteRecipe()" class="flex-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-semibold py-3 rounded-2xl">Annulla</button>
        <button onclick="confirmDeleteRecipe()" class="flex-1 bg-red-500 text-white font-semibold py-3 rounded-2xl">Elimina</button>
      </div>
    </div>
  </div>

  <!-- Modal Inserimento Ricetta -->
  <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end md:items-center justify-center hidden z-50">
    <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-t-3xl md:rounded-3xl p-6 shadow-xl max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold dark:text-white">Aggiungi nuova ricetta</h3>
        <button onclick="toggleModal(false)" class="text-gray-400 hover:text-black dark:hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Incolla il testo grezzo della ricetta. L'AI la analizzerà e la strutturerà automaticamente!</p>
      
      <textarea id="raw-recipe-text" rows="6" placeholder="" 
                class="w-full border dark:border-gray-600 dark:bg-gray-900 dark:text-white dark:placeholder-gray-500 rounded-2xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 mb-4"></textarea>

      <button id="btn-submit" onclick="submitRecipe()" class="w-full bg-emerald-400 hover:bg-emerald-500 text-black font-semibold py-3 rounded-2xl transition flex justify-center items-center gap-2">
        <span>Elabora con AI</span>
      </button>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://ricettario-backend.bix20252025.workers.dev";

    let allRecipes = [];
    let currentCategory = "Tutti";

    // Registrazione Service Worker per PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrato con successo:', reg.scope))
          .catch(err => console.error('Errore registrazione Service Worker:', err));
      });
    }

    // ==========================================
    // Cache di sicurezza offline (localStorage)
    // ==========================================
    const RECIPES_CACHE_KEY = "recipes_cache_v1";

    function saveRecipesCache(recipes) {
      try { localStorage.setItem(RECIPES_CACHE_KEY, JSON.stringify(recipes)); } catch (e) {}
    }

    function loadRecipesCache() {
      try {
        const raw = localStorage.getItem(RECIPES_CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function showOfflineBanner(show) {
      const banner = document.getElementById("offline-banner");
      if (banner) banner.classList.toggle("hidden", !show);
    }

    // Carica ricette all'avvio: se non c'è internet, usa l'ultima copia salvata localmente
    async function loadRecipes() {
      try {
        const res = await fetch(`${WORKER_URL}/api/recipes`);
        if (!res.ok) throw new Error("Risposta non valida dal server");
        allRecipes = await res.json();
        saveRecipesCache(allRecipes);
        showOfflineBanner(false);
        renderRecipes();
      } catch (err) {
        console.error("Errore nel caricamento delle ricette, provo dalla cache locale:", err);
        const cached = loadRecipesCache();
        if (cached) {
          allRecipes = cached;
          showOfflineBanner(true);
        }
        renderRecipes();
      }
    }

    function renderRecipes() {
      const grid = document.getElementById("recipes-grid");
      const searchVal = document.getElementById("search-input").value.toLowerCase();
      grid.innerHTML = "";

      const filtered = allRecipes.filter(r => {
        const matchCat = currentCategory === "Tutti" || r.category === currentCategory;
        const matchSearch = r.title.toLowerCase().includes(searchVal) || 
                            r.ingredients.some(i => i.name.toLowerCase().includes(searchVal));
        return matchCat && matchSearch;
      });

      
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10">Nessuna ricetta trovata</div>`;
        return;
      }

      filtered.forEach(r => {
        const img = getRecipeImage(r);

        grid.innerHTML += `
          <div onclick="handleCardClick('${r.id}')"
               onmousedown="startLongPress('${r.id}')" onmouseup="cancelLongPress()" onmouseleave="cancelLongPress()"
               ontouchstart="startLongPress('${r.id}')" ontouchend="cancelLongPress()" ontouchmove="cancelLongPress()"
               oncontextmenu="return false;"
               class="bg-white dark:bg-gray-800 rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm flex flex-col cursor-pointer active:scale-[0.97] transition select-none">
            <div class="relative h-32 bg-gray-200 dark:bg-gray-700">
              <img src="${img}" class="w-full h-full object-cover">
              <span class="absolute top-2 left-2 bg-white/90 dark:bg-gray-900/80 backdrop-blur-sm text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider text-gray-700 dark:text-gray-200">${r.category}</span>
            </div>
            <div class="p-3 flex flex-col justify-between flex-1">
              <h4 class="font-bold text-sm text-gray-900 dark:text-white leading-tight mb-2">${r.title}</h4>
              <p class="text-xs text-gray-400 dark:text-gray-500"><i class="fa-regular fa-clock mr-1"></i>${r.prep_time_min} min</p>
            </div>
          </div>
        `;
      });
    }

    // Immagine di sfondo in base alla categoria (in attesa di foto reali per ricetta)
    function imageForCategory(category) {
      const images = {
        "Primi": "https://images.unsplash.com/photo-1476124369491-e7addf5db371?auto=format&fit=crop&w=800&q=80",
        "Secondi": "https://images.unsplash.com/photo-1432139555190-58524dae6a55?auto=format&fit=crop&w=800&q=80",
        "Dolci": "https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&w=800&q=80",
        "Contorni": "https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=800&q=80",
        "Antipasti": "https://images.unsplash.com/photo-1541529086526-db283c563270?auto=format&fit=crop&w=800&q=80"
      };
      return images[category] || "https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&w=800&q=80";
    }

    // Restituisce la foto personalizzata salvata localmente per una ricetta, altrimenti l'immagine di categoria
    function getRecipeImage(recipe) {
      try {
        const custom = localStorage.getItem(`recipe_photo_${recipe.id}`);
        if (custom) return custom;
      } catch (e) {}
      return imageForCategory(recipe.category);
    }

    function setCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        if(btn.innerText === cat) {
          btn.className = "cat-btn bg-black dark:bg-white text-white dark:text-black px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap";
        } else {
          btn.className = "cat-btn bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap";
        }
      });
      renderRecipes();
    }

    // ==========================================
    // Tema chiaro / scuro
    // ==========================================
    function updateThemeColorMeta(isDark) {
      const meta = document.getElementById('theme-color-meta');
      if (meta) meta.setAttribute('content', isDark ? '#030712' : '#f3f4f6');
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
      updateThemeColorMeta(isDark);
    }

    function filterRecipes() {
      renderRecipes();
    }

    // ==========================================
    // Scheda ricetta singola
    // ==========================================
    let currentDetailRecipe = null;

    function openRecipeDetail(id) {
      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;

      currentDetailRecipe = recipe;
      resetEditUI();

      document.getElementById("rd-image").src = getRecipeImage(recipe);
      document.getElementById("rd-category").innerText = recipe.category;
      document.getElementById("rd-title").innerText = recipe.title;

      renderInstructionsView();

      document.getElementById("rd-description").innerText =
        recipe.description || `Pronta in circa ${recipe.prep_time_min} minuti.`;

      renderIngredients();

      const detail = document.getElementById("recipe-detail");
      detail.scrollTop = 0;
      // Forza il reflow prima di rimuovere la classe, cosi' il browser anima sempre la transizione
      // (utile se si riapre subito dopo una chiusura)
      void detail.offsetHeight;
      detail.classList.remove("translate-y-full");

      // Aggiunge una voce nella cronologia così il tasto "indietro" chiude la ricetta
      history.pushState({ view: "recipe", id }, "", `#recipe-${id}`);
    }

    // Chiamata dal pulsante freccia: torna indietro nella cronologia,
    // così il comportamento è identico a quello del tasto back del telefono/browser
    function closeRecipeDetail() {
      if (history.state && history.state.view === "recipe") {
        history.back();
      } else {
        closeRecipeDetailInternal();
      }
    }

    function closeRecipeDetailInternal() {
      const detail = document.getElementById("recipe-detail");
      detail.classList.add("translate-y-full");
      currentDetailRecipe = null;
    }

    // Mantiene sempre una voce "home" in cima alla cronologia. Senza questo,
    // premendo "indietro" dalla home il browser/l'app non ha più nulla su cui
    // tornare ed esce mostrando prima una schermata nera di transizione.
    function ensureHomeHistoryEntry() {
      if (!history.state || history.state.view !== "recipe") {
        history.pushState({ view: "home" }, "", location.pathname + location.search);
      }
    }

    // ==========================================
    // "Premi di nuovo per uscire" (come Instagram)
    // ==========================================
    let exitConfirmArmed = false;
    let exitConfirmTimer = null;
    const EXIT_CONFIRM_WINDOW_MS = 2000;

    function showExitToast() {
      const frame = document.getElementById("recipe-detail").parentElement;
      let toast = document.getElementById("exit-toast");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "exit-toast";
        toast.innerText = "Premi di nuovo per uscire";
        toast.className = "absolute left-1/2 -translate-x-1/2 bottom-24 bg-gray-900/90 dark:bg-gray-100/90 text-white dark:text-gray-900 text-sm font-medium px-4 py-2.5 rounded-full shadow-lg z-[70] opacity-0 transition-opacity duration-200 pointer-events-none whitespace-nowrap";
        frame.appendChild(toast);
      }
      // Forza il reflow cosi' il fade-in riparte anche se il toast era già visibile
      void toast.offsetHeight;
      toast.classList.remove("opacity-0");
      clearTimeout(toast._hideTimer);
      toast._hideTimer = setTimeout(() => toast.classList.add("opacity-0"), EXIT_CONFIRM_WINDOW_MS);
    }

    // Gestisce il tasto back hardware/browser
    window.addEventListener("popstate", (e) => {
      if (e.state && e.state.view === "recipe") return;

      const wasShowingRecipe = currentDetailRecipe !== null;
      closeRecipeDetailInternal();

      if (wasShowingRecipe) {
        // Il back ha solo chiuso la scheda ricetta: la voce "home" sottostante
        // è già presente in cronologia, nessuna azione extra necessaria.
        return;
      }

      // Eravamo già sulla home: gestisci il doppio back per uscire davvero
      if (exitConfirmArmed) {
        clearTimeout(exitConfirmTimer);
        exitConfirmArmed = false;
        setTimeout(() => history.back(), 0); // seconda pressione confermata: esce per davvero
      } else {
        exitConfirmArmed = true;
        showExitToast();
        ensureHomeHistoryEntry(); // resta pronta un'altra voce per assorbire back accidentali
        exitConfirmTimer = setTimeout(() => { exitConfirmArmed = false; }, EXIT_CONFIRM_WINDOW_MS);
      }
    });

    ensureHomeHistoryEntry();

    // ==========================================
    // Swipe verso il basso per chiudere la scheda ricetta
    // (attivo solo quando il contenuto è già scrollato in cima)
    // ==========================================
    let rdTouchStartY = 0;
    let rdTouchCurrentY = 0;
    let rdIsDraggingToClose = false;
    const RD_CLOSE_THRESHOLD = 90; // px di swipe necessari per chiudere

    function onDetailTouchStart(e) {
      rdTouchStartY = e.touches[0].clientY;
      rdTouchCurrentY = rdTouchStartY;
      rdIsDraggingToClose = false;
    }

    function onDetailTouchMove(e) {
      const detail = document.getElementById("recipe-detail");
      rdTouchCurrentY = e.touches[0].clientY;
      const deltaY = rdTouchCurrentY - rdTouchStartY;

      // Si attiva solo se il contenuto è già in cima e il dito si muove verso il basso
      if (detail.scrollTop <= 0 && deltaY > 0) {
        rdIsDraggingToClose = true;
        e.preventDefault(); // evita il rimbalzo/scroll della pagina mentre si trascina
        const dragDistance = Math.min(deltaY, 300);
        detail.style.transition = "none";
        detail.style.transform = `translateY(${dragDistance}px)`;
      }
    }

    function onDetailTouchEnd() {
      const detail = document.getElementById("recipe-detail");
      const deltaY = rdTouchCurrentY - rdTouchStartY;

      // Ripristina la transizione originale (quella usata per l'animazione top-down)
      detail.style.transition = "";
      detail.style.transform = "";

      if (rdIsDraggingToClose && deltaY > RD_CLOSE_THRESHOLD) {
        closeRecipeDetail(); // stessa animazione/flusso del pulsante indietro
      }

      rdIsDraggingToClose = false;
      rdTouchStartY = 0;
      rdTouchCurrentY = 0;
    }

    function renderInstructionsView() {
      if (!currentDetailRecipe) return;
      const instructionsLabel = document.getElementById("rd-instructions-label");
      const instructionsList = document.getElementById("rd-instructions");
      const recipe = currentDetailRecipe;
      if (Array.isArray(recipe.instructions) && recipe.instructions.length > 0) {
        instructionsLabel.classList.remove("hidden");
        instructionsList.innerHTML = recipe.instructions.map(step => `<li>${escapeHtml(step)}</li>`).join("");
      } else {
        instructionsLabel.classList.add("hidden");
        instructionsList.innerHTML = "";
      }
    }

    function renderIngredients() {
      if (!currentDetailRecipe) return;
      const list = document.getElementById("rd-ingredients");
      list.innerHTML = (currentDetailRecipe.ingredients || []).map(ing => {
        const qty = formatQuantity(ing.quantity, ing.unit);
        const unit = ing.unit ? ` ${ing.unit}` : "";
        return `
          <div class="flex justify-between items-center py-3 text-base">
            <span class="text-gray-800 dark:text-gray-200 font-medium">${ing.name}</span>
            <span class="font-semibold text-gray-900 dark:text-white">${qty}${unit}</span>
          </div>
        `;
      }).join("");
    }

    // Arrotonda le quantità numeriche in modo leggibile; lascia invariato il testo libero (es. "1/2", "q.b.")
    function formatQuantity(value, unit) {
      if (value === null || value === undefined || value === "") return "";
      const num = Number(value);
      const isPlainNumber = value !== "" && !isNaN(num) && /^-?\d+([.,]\d+)?$/.test(String(value).trim());
      if (!isPlainNumber) return String(value).trim();
      if (unit === "pz" || unit === "pezzi") {
        return Math.max(1, Math.round(num));
      }
      const rounded = Math.round(num * 10) / 10;
      return rounded % 1 === 0 ? rounded.toFixed(0) : rounded.toFixed(1);
    }

    // ==========================================
    // Cambio foto ricetta (salvata localmente sul dispositivo)
    // ==========================================
    function triggerPhotoChange() {
      document.getElementById("rd-photo-input").click();
    }

    function onPhotoSelected(event) {
      const file = event.target.files[0];
      if (!file || !currentDetailRecipe) return;

      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        try {
          localStorage.setItem(`recipe_photo_${currentDetailRecipe.id}`, dataUrl);
        } catch (e) {
          alert("Impossibile salvare la foto (spazio insufficiente).");
          return;
        }
        document.getElementById("rd-image").src = dataUrl;
      };
      reader.readAsDataURL(file);
      event.target.value = "";
    }

    // ==========================================
    // Modalità di modifica ricetta
    // ==========================================
    let isEditingRecipe = false;
    let editIngredients = [];
    let editInstructions = [];

    function escapeHtml(str) {
      return String(str ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/"/g, "&quot;");
    }

    // Nasconde i campi di modifica e ripristina la vista normale (usata anche all'apertura di una ricetta)
    function resetEditUI() {
      isEditingRecipe = false;
      document.getElementById("rd-edit-btn").classList.remove("hidden");
      document.getElementById("rd-edit-actions").classList.add("hidden");
      document.getElementById("rd-edit-actions").classList.remove("flex");

      document.getElementById("rd-title").classList.remove("hidden");
      document.getElementById("rd-title-input").classList.add("hidden");
      document.getElementById("rd-category").classList.remove("hidden");
      document.getElementById("rd-category-select").classList.add("hidden");
      document.getElementById("rd-description").classList.remove("hidden");
      document.getElementById("rd-description-input").classList.add("hidden");
    }

    function enterEditMode() {
      if (!currentDetailRecipe) return;
      isEditingRecipe = true;
      editIngredients = (currentDetailRecipe.ingredients || []).map(i => ({ ...i }));
      editInstructions = [...(currentDetailRecipe.instructions || [])];

      document.getElementById("rd-edit-btn").classList.add("hidden");
      document.getElementById("rd-edit-actions").classList.remove("hidden");
      document.getElementById("rd-edit-actions").classList.add("flex");

      document.getElementById("rd-title").classList.add("hidden");
      const titleInput = document.getElementById("rd-title-input");
      titleInput.value = currentDetailRecipe.title || "";
      titleInput.classList.remove("hidden");

      document.getElementById("rd-category").classList.add("hidden");
      const catSelect = document.getElementById("rd-category-select");
      catSelect.value = currentDetailRecipe.category || "Primi";
      catSelect.classList.remove("hidden");

      document.getElementById("rd-description").classList.add("hidden");
      const descInput = document.getElementById("rd-description-input");
      descInput.value = currentDetailRecipe.description || "";
      descInput.classList.remove("hidden");

      renderIngredientsEditable();
      renderInstructionsEditable();
    }

    function cancelEditMode() {
      resetEditUI();
      renderIngredients();
      renderInstructionsView();
    }

    function renderIngredientsEditable() {
      const list = document.getElementById("rd-ingredients");
      list.innerHTML = editIngredients.map((ing, idx) => `
        <div class="flex items-center gap-1.5 py-2">
          <input type="text" value="${escapeAttr(ing.name)}" placeholder="Ingrediente"
                 oninput="updateEditIngredient(${idx}, 'name', this.value)"
                 class="flex-1 min-w-0 border dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl px-2 py-2 text-sm">
          <input type="text" inputmode="text" value="${escapeAttr(ing.quantity ?? "")}" placeholder="Qtà"
                 oninput="updateEditIngredient(${idx}, 'quantity', this.value)"
                 class="w-14 flex-shrink-0 border dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl px-1 py-2 text-sm text-center">
          <input type="text" value="${escapeAttr(ing.unit)}" placeholder="Unità"
                 oninput="updateEditIngredient(${idx}, 'unit', this.value)"
                 class="w-14 flex-shrink-0 border dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl px-1 py-2 text-sm text-center">
          <button onclick="removeIngredientRow(${idx})" class="text-red-400 w-6 h-8 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-trash text-sm"></i>
          </button>
        </div>
      `).join("") + `
        <button onclick="addIngredientRow()" class="mt-2 text-emerald-600 text-sm font-semibold flex items-center gap-1">
          <i class="fa-solid fa-plus"></i> Aggiungi ingrediente
        </button>
      `;
    }

    function updateEditIngredient(idx, field, value) {
      if (!editIngredients[idx]) return;
      editIngredients[idx][field] = value;
    }

    function addIngredientRow() {
      editIngredients.push({ name: "", quantity: "", unit: "" });
      renderIngredientsEditable();
    }

    function removeIngredientRow(idx) {
      editIngredients.splice(idx, 1);
      renderIngredientsEditable();
    }

    function renderInstructionsEditable() {
      document.getElementById("rd-instructions-label").classList.remove("hidden");
      const list = document.getElementById("rd-instructions");
      list.innerHTML = editInstructions.map((step, idx) => `
        <li class="flex items-start gap-2 list-none -ml-5">
          <span class="text-gray-400 font-bold mt-2">${idx + 1}.</span>
          <textarea oninput="updateEditInstruction(${idx}, this.value)" rows="2"
                    class="flex-1 border rounded-xl px-3 py-2 text-sm">${escapeHtml(step)}</textarea>
          <button onclick="removeInstructionStep(${idx})" class="text-red-400 w-8 h-8 flex items-center justify-center flex-shrink-0 mt-1">
            <i class="fa-solid fa-trash text-sm"></i>
          </button>
        </li>
      `).join("") + `
        <li class="list-none -ml-5">
          <button onclick="addInstructionStep()" class="text-emerald-600 text-sm font-semibold flex items-center gap-1">
            <i class="fa-solid fa-plus"></i> Aggiungi passaggio
          </button>
        </li>
      `;
    }

    function updateEditInstruction(idx, value) {
      editInstructions[idx] = value;
    }

    function addInstructionStep() {
      editInstructions.push("");
      renderInstructionsEditable();
    }

    function removeInstructionStep(idx) {
      editInstructions.splice(idx, 1);
      renderInstructionsEditable();
    }

    async function saveRecipeEdits() {
      if (!currentDetailRecipe) return;
      const saveBtn = document.getElementById("rd-save-btn");
      const originalHtml = saveBtn.innerHTML;
      saveBtn.disabled = true;
      saveBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;

      const updated = {
        ...currentDetailRecipe,
        title: document.getElementById("rd-title-input").value.trim() || currentDetailRecipe.title,
        category: document.getElementById("rd-category-select").value,
        description: document.getElementById("rd-description-input").value.trim(),
        ingredients: editIngredients.filter(i => (i.name || "").trim() !== ""),
        instructions: editInstructions.map(s => s.trim()).filter(s => s !== "")
      };

      try {
        const res = await fetch(`${WORKER_URL}/api/recipes/${updated.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(updated)
        });
        if (!res.ok) throw new Error("Errore salvataggio");
      } catch (e) {
        alert("Errore durante il salvataggio della ricetta");
        saveBtn.disabled = false;
        saveBtn.innerHTML = originalHtml;
        return;
      }

      currentDetailRecipe = updated;
      const idx = allRecipes.findIndex(r => r.id === updated.id);
      if (idx !== -1) allRecipes[idx] = updated;
      saveRecipesCache(allRecipes);

      resetEditUI();
      document.getElementById("rd-category").innerText = updated.category;
      document.getElementById("rd-title").innerText = updated.title;
      document.getElementById("rd-description").innerText =
        updated.description || `Pronta in circa ${updated.prep_time_min} minuti.`;

      renderIngredients();
      renderInstructionsView();
      renderRecipes();

      saveBtn.disabled = false;
      saveBtn.innerHTML = originalHtml;
    }

    // ==========================================
    // Eliminazione ricetta con pressione prolungata
    // ==========================================
    let longPressTimer = null;
    let longPressTriggered = false;
    let pendingDeleteId = null;

    function startLongPress(id) {
      longPressTriggered = false;
      longPressTimer = setTimeout(() => {
        longPressTriggered = true;
        openDeleteModal(id);
      }, 550);
    }

    function cancelLongPress() {
      clearTimeout(longPressTimer);
    }

    function handleCardClick(id) {
      if (longPressTriggered) {
        longPressTriggered = false;
        return;
      }
      openRecipeDetail(id);
    }

    function openDeleteModal(id) {
      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;
      pendingDeleteId = id;
      document.getElementById("delete-modal-text").innerText = `"${recipe.title}" verrà eliminata definitivamente.`;
      document.getElementById("delete-modal").classList.remove("hidden");
    }

    function cancelDeleteRecipe() {
      pendingDeleteId = null;
      document.getElementById("delete-modal").classList.add("hidden");
    }

    async function confirmDeleteRecipe() {
      if (!pendingDeleteId) return;
      const id = pendingDeleteId;

      try {
        const res = await fetch(`${WORKER_URL}/api/recipes/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Errore eliminazione");
      } catch (e) {
        alert("Errore durante l'eliminazione della ricetta");
        return;
      }

      try {
        localStorage.removeItem(`recipe_photo_${id}`);
      } catch (e) {}

      allRecipes = allRecipes.filter(r => r.id !== id);
      saveRecipesCache(allRecipes);
      renderRecipes();
      cancelDeleteRecipe();
    }

    function toggleModal(show) {
      document.getElementById("modal").classList.toggle("hidden", !show);
    }

    async function submitRecipe() {
      const text = document.getElementById("raw-recipe-text").value.trim();
      if (!text) return alert("Inserisci il testo della ricetta");

      const btn = document.getElementById("btn-submit");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Elaborazione AI...`;

      try {
        const res = await fetch(`${WORKER_URL}/api/parse-recipe`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rawText: text })
        });

        if (res.ok) {
          document.getElementById("raw-recipe-text").value = "";
          toggleModal(false);
          await loadRecipes();
        } else {
          alert("Errore nell'elaborazione della ricetta");
        }
      } catch (e) {
        alert("Errore di connessione al worker");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>Elabora con AI</span>`;
      }
    }

    loadRecipes();
    updateThemeColorMeta(document.documentElement.classList.contains('dark'));
  </script>
</body>
</html>
